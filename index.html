<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Travels World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        #container { display: flex; height: 100vh; }
        #map { flex: 3; }
        #sidebar { flex: 1; padding: 15px; background: #f4f4f4; overflow-y: auto; border-left: 2px solid #ccc; }
        h1 { margin-top: 0; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; background: white; margin-bottom: 8px; border-radius: 4px; }
        button { margin-left: 8px; }
        .leaflet-popup-content { font-size: 14px; }
    </style>
</head>
<body>
    <div id="container">
        <div id="map"></div>
        <div id="sidebar">
            <h1>Family Travels 🌍</h1>
            <p><strong>Visited countries:</strong> <span id="count">0</span></p>
            <h3>Visit Log</h3>
            <ul id="visit-list"></ul>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);

        // Better map style for country visibility
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles © Esri'
        }).addTo(map);

        let visited = JSON.parse(localStorage.getItem('familyVisited')) || {};

        const geojsonUrl = "https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_110m_admin_0_countries.geojson";

        let geojsonLayer;

        function updateSidebar() {
            const list = document.getElementById('visit-list');
            const countEl = document.getElementById('count');
            list.innerHTML = '';
            let count = 0;

            Object.keys(visited).sort().forEach(country => {
                count++;
                const li = document.createElement('li');
                li.innerHTML = `<strong>${country}</strong> — ${visited[country]}
                    <button onclick="editVisit('${country.replace(/'/g, "\\'")}')">Edit</button>
                    <button onclick="deleteVisit('${country.replace(/'/g, "\\'")}')">Delete</button>`;
                list.appendChild(li);
            });
            countEl.textContent = count;
        }

        function saveVisited() {
            localStorage.setItem('familyVisited', JSON.stringify(visited));
            if (geojsonLayer) geojsonLayer.setStyle(styleFunction);
            updateSidebar();
        }

        function styleFunction(feature) {
            const name = feature.properties.ADMIN || feature.properties.NAME;
            return {
                fillColor: visited[name] ? '#22c55e' : '#94a3b8',
                weight: 1.8,
                color: '#1e2937',
                fillOpacity: 0.8
            };
        }

        function onEachFeature(feature, layer) {
            const countryName = feature.properties.ADMIN || feature.properties.NAME;
            if (!countryName) return;

            layer.on({
                mouseover: function() {
                    this.setStyle({ fillOpacity: 0.95, weight: 3 });
                    const year = visited[countryName] ? `<br>Visited: ${visited[countryName]}` : '';
                    this.bindTooltip(`<strong>${countryName}</strong>${year}`, {
                        sticky: true,
                        direction: "top",
                        className: "custom-tooltip"
                    }).openTooltip();
                },
                mouseout: function() {
                    this.setStyle(styleFunction(feature));
                },
                click: function() {
                    let year = visited[countryName] || new Date().getFullYear();
                    const input = prompt(`📍 Enter visit year for **${countryName}**`, year);
                    if (input !== null && input !== "") {
                        visited[countryName] = parseInt(input);
                        saveVisited();
                    }
                }
            });
        }

        fetch(geojsonUrl)
            .then(r => r.json())
            .then(data => {
                geojsonLayer = L.geoJSON(data, {
                    style: styleFunction,
                    onEachFeature: onEachFeature
                }).addTo(map);
                updateSidebar();
            });

        // Global functions
        window.editVisit = function(country) {
            let year = visited[country] || new Date().getFullYear();
            const input = prompt(`Edit year for ${country}:`, year);
            if (input !== null && input !== "") {
                visited[country] = parseInt(input);
                saveVisited();
            }
        };

        window.deleteVisit = function(country) {
            if (confirm(`Delete visit for ${country}?`)) {
                delete visited[country];
                saveVisited();
            }
        };
    </script>
</body>
</html>
