<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Travels World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        #container { display: flex; height: 100vh; }
        #map { flex: 3; background: #f0f0f0; }
        #sidebar { flex: 1; padding: 15px; background: #f4f4f4; overflow-y: auto; border-left: 2px solid #ccc; }
        h1 { margin-top: 0; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; background: white; margin-bottom: 8px; border-radius: 4px; }
        button { margin-left: 8px; }
    </style>
</head>
<body>
    <div id="container">
        <div id="map"></div>
        <div id="sidebar">
            <h1>Family Travels 🌍</h1>
            <p><strong>Visited countries:</strong> <span id="count">0</span></p>
            <h3>Visit Log</h3>
            <ul id="visit-list"></ul>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let visited = JSON.parse(localStorage.getItem('familyVisited')) || {};
        let geojsonLayer;

        function updateSidebar() {
            const list = document.getElementById('visit-list');
            const countEl = document.getElementById('count');
            list.innerHTML = '';
            let count = 0;
            Object.keys(visited).sort().forEach(country => {
                count++;
                const li = document.createElement('li');
                li.innerHTML = `<strong>${country}</strong> — ${visited[country]}
                    <button onclick="editVisit('${country.replace(/'/g, "\\'")}')">Edit</button>
                    <button onclick="deleteVisit('${country.replace(/'/g, "\\'")}')">Delete</button>`;
                list.appendChild(li);
            });
            countEl.textContent = count;
        }

        function saveVisited() {
            localStorage.setItem('familyVisited', JSON.stringify(visited));
            if (geojsonLayer) geojsonLayer.setStyle(styleFunction);
            updateSidebar();
        }

        function styleFunction(feature) {
            const name = feature.properties.ADMIN || feature.properties.NAME;
            const isVisited = !!visited[name];
            return {
                fillColor: isVisited ? '#4ade80' : '#cbd5e1',
                weight: 2.8,
                color: '#1e2937',
                fillOpacity: isVisited ? 0.65 : 0.45
            };
        }

        function onEachFeature(feature, layer) {
            const countryName = feature.properties.ADMIN || feature.properties.NAME;
            if (!countryName) return;

            layer.bindTooltip(countryName, { sticky: true });

            layer.on('click', function(e) {
                L.DomEvent.stopPropagation(e);
                let year = visited[countryName] || new Date().getFullYear();
                year = prompt(`Enter visit year for ${countryName}:`, year);
                if (year !== null && year.trim() !== "") {
                    visited[countryName] = parseInt(year);
                    saveVisited();
                }
            });
        }

        // Load countries
        fetch("https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_110m_admin_0_countries.geojson")
            .then(r => r.json())
